<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Doação De Sangue</title>
</head>
<body>
    <header>DOAÇÃO DE SANGUE</header>
    <form id="FormSangue">
        <h1>Preencha os dados com cuidado!</h1>
        <main>
            <input type="text" id="nome" placeholder="Nome"> <br><br>
            <input type="email" id="email" placeholder="Email"><br><br>
            <input type="text" id="idade" placeholder="Idade"> <br><br>
            <input type="text" id="peso" placeholder="Peso"> <br><br>
            <label for="TipoSanguineo">Tipo Sanguíneo:</label>
            <select id="TipoSanguineo">
                <option value="">Selecione</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
            </select>
            <input type="text" id="telefone" placeholder="Telefone"> <br><br>
        </main>
    </form>
    <script src="script.js"></script>
</body>
</html>
