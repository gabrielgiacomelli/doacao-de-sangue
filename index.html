<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Doação De Sangue</title>
</head>
<body>
    <header>DOAÇÃO DE SANGUE</header>
    <div class="div">
        <form id="FormSangue">
            <main>
                <input type="text" id="nome" placeholder="Nome"> <br><br>
                <input type="email" id="email" placeholder="Email"><br><br>
                <input type="text" id="idade" placeholder="Idade"> <br><br>
                <input type="text" id="peso" placeholder="Peso"> <br><br>
                <label for="TipoSanguineo">Tipo Sanguíneo:</label><br>
                <select id="TipoSanguineo">
                    <option value="">Selecione</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select><br><br>
                <input type="text" id="telefone" placeholder="Telefone"> <br><br>
                <input type="text" id="cidade" placeholder="Cidade"><br><br>
                <input type="text" id="estado" placeholder="Estado"><br><br>
                <button type="submit">ENVIAR</button>
                <div id="resultado"></div>
            </main>
        </form>

    </div>
    <script src="script.js"></script>
</body>
</html>
